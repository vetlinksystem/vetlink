<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetLink — User Details</title>
  <link rel="stylesheet" href="/employee/css/dashboard.css"/>
  <link rel="stylesheet" href="/user/css/user.css"/>
</head>
<body>
<div id="app" class="layout">
  <aside id="sidebar" class="sidebar">
    <div class="brand"><img src="/logo.png" class="logo" alt="VetLink"/><span class="brand-name">VetLink</span></div>
    <nav class="nav">
        <a class="nav-item" href="/employee/dashboard"><span class="icon">📊</span><span>Analytic Dashboard</span></a>
        <a class="nav-item active" href="/employee/users"><span class="icon">👥</span><span>Registered User</span></a>
        <a class="nav-item" href="/employee/employees"><span class="icon">🧑</span><span>Manage Employees</span></a>
        <a class="nav-item" href="/employee/pets"><span class="icon">🐾</span><span>Manage Pets</span></a>
        <a class="nav-item" href="/employee/schedule"><span class="icon">🗓️</span><span>Schedule</span></a>
        <a class="nav-item" href="/employee/appointments"><span class="icon">📝</span><span>Appointments</span></a>
        <a class="nav-item" href="/employee/profile"><span class="icon">⚙️</span><span>Update Profile</span></a>
        <div class="nav-spacer"></div>
        <button class="nav-item danger" id="logoutBtn"><span class="icon">↩️</span><span>Logout</span></button>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <button id="sidebarToggle" class="ghost-btn">☰</button>
      <div class="breadcrumbs">Home <span class="sep">/</span> <span id="crumb">User Details</span></div>
      <div class="account">
        <button id="accountBtn" class="avatar-btn"><span id="accountName">User</span><span class="avatar">🛡️</span></button>
        <div id="accountMenu" class="menu"><a href="/employee/profile">Settings / Profile</a><a href="#" id="menuLogout">Logout</a></div>
      </div>
    </header>

    <section class="view active">
      <h1 class="page-title">User Details</h1>
      <div class="grid">
        <div class="card">
          <h2 class="panel-title">Owner</h2>
          <div id="userInfo"></div>
        </div>
        <div class="card">
          <h2 class="panel-title">Pets</h2>
          <div class="table"><table id="userPets"></table></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="/employee/js/core.js"></script>
<script src="/user/js/user.js"></script>
</body>
</html>
