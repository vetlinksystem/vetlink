<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client • My Pets</title>
  <link href="/client/css/core.css" rel="stylesheet"/>
  <link href="/client/css/pets.css" rel="stylesheet"/>
</head>
<body data-page="#pets">
  <div id="scrim"></div>

  <div class="shell">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="brand">
        <div class="logo">🐾</div>
        <div><strong>VetLink</strong><br/><small>Client Portal</small></div>
      </div>
      <nav class="nav">
        <a href="/client/dashboard"    data-page="#dashboard">Dashboard</a>
        <a href="/client/pets"         data-page="#pets" class="active">My Pets</a>
        <a href="/client/appointments" data-page="#appointments">Appointments</a>
        <a href="/client/records"      data-page="#records">Records</a>
        <a href="/client/profile"      data-page="#profile">Profile</a>

        <div style="padding:.75rem;margin-top:.75rem">
          <button class="btn secondary" id="logoutBtn">Log out</button>
        </div>
      </nav>
    </aside>

    <!-- MAIN -->
    <div>
      <header class="top">
        <div class="search">
          🔍
          <input
            class="input"
            id="searchBox"
            placeholder="Search pets…"
            style="background:transparent;border:none;padding:0"
          />
        </div>
        <div style="display:flex;align-items:center;gap:.5rem"><div class="chip">
            Logged in as
            <strong id="accountName" style="margin-left:.35rem">Client</strong>
          </div>
        </div>
      </header>

      <main>
        <div style="display:flex;justify-content:space-between;align-items:end;gap:.75rem;flex-wrap:wrap">
          <div>
            <h2 style="margin:0">My Pets</h2>
            <small style="color:var(--muted)">Manage profiles, vaccines, and breeding preference.</small>
          </div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
            <!-- Species filter (used by pets.js as #filterSpecies) -->
            <select class="input" id="filterSpecies" style="width:160px">
              <option value="">All species</option>
              <option>Dog</option>
              <option>Cat</option>
              <option>Others</option>
            </select>

            <!-- Sex filter (new, used by pets.js as #filterSex) -->
            <select class="input" id="filterSex" style="width:120px">
              <option value="">All</option>
              <option>Male</option>
              <option>Female</option>
            </select>

            <!-- Breeding filter (checkbox, used by pets.js as #onlyBreedable) -->
            <label style="display:flex;align-items:center;gap:.35rem;font-size:.85rem">
              <input type="checkbox" id="onlyBreedable"/>
              <span>Breeding allowed only</span>
            </label>

            <!-- Add pet button (UI only for now) -->
            <button class="btn" id="addPetBtn">➕ Add pet</button>
          </div>
        </div>

        <!-- Summary pills row (pets.js: #petsSummary) -->
        <div id="petsSummary" class="summary-row" style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap"></div>

        <!-- Pets grid (pets.js: #petsGrid) -->
        <div id="petsGrid" class="pets-grid" style="margin-top:.75rem">
          <!-- Filled by /client/js/pets.js -->
        </div>
      </main>
    </div>
  </div>

  <!-- Add/Edit Pet Modal (kept for later wiring) -->
  <div class="modal" id="petModal" role="dialog" aria-modal="true">
    <div class="panel">
      <header>
        <strong id="petModalTitle">Add Pet</strong>
        <button class="btn ghost" data-close>✖</button>
      </header>
      <div class="content">
        <div class="form-grid" style="display:grid;gap:1rem;grid-template-columns:repeat(2,1fr)">
          <input class="input" id="pName" placeholder="Name"/>
          <select class="input" id="pSpecies">
            <option>Dog</option><option>Cat</option><option>Others</option>
          </select>
          <select class="input" id="pBreed">
            <option value="">Breed</option>
          </select>

          <input class="input" id="pBreedOther" placeholder="Specify breed" style="display:none"/>

          <select class="input" id="pSex">
            <option value="">Sex (optional)</option>
            <option>Male</option>
            <option>Female</option>
          </select>

          <input class="input" id="pAge" type="number" min="0" placeholder="Age (yrs)"/>

          <label class="breeding col-2" style="grid-column:span 2;display:flex;align-items:center;gap:.6rem">
            <input type="checkbox" id="pBreeding" />
            <span>Allow this pet for breeding</span>
          </label>

          <textarea
            class="input col-2"
            id="pNotes"
            placeholder="Notes (optional)"
            rows="3"
            style="grid-column:span 2"
          ></textarea>

          <div class="col-2" style="grid-column:span 2;display:flex;gap:.5rem;justify-content:flex-end">
            <button class="btn ghost" data-close>Cancel</button>
            <button class="btn" id="pSubmit">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script src="/client/js/core.js"></script>
  <script src="/client/js/pets.js"></script>
</body>
</html>
