<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client • Records</title>
  <link href="/client/css/core.css" rel="stylesheet"/>
  <link href="/client/css/records.css" rel="stylesheet"/>
</head>
<body data-page="#records">
  <div id="scrim"></div>

  <div class="shell">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="brand">
        <div class="logo">🐾</div>
        <div><strong>VetLink</strong><br/><small>Client Portal</small></div>
      </div>
      <nav class="nav">
        <a href="/client/dashboard"    data-page="#dashboard">Dashboard</a>
        <a href="/client/pets"         data-page="#pets">My Pets</a>
        <a href="/client/breeding"     data-page="#breeding">Breeding</a>
        <a href="/client/chats"        data-page="#chats">Messages</a>
        <a href="/client/appointments" data-page="#appointments">Appointments</a>
        <a href="/client/records"      data-page="#records" class="active">Records</a>
        <a href="/client/profile"      data-page="#profile">Profile</a>

        <div style="padding:.75rem;margin-top:.75rem">
          <button class="btn secondary" id="logoutBtn">Log out</button>
        </div>
      </nav>
    </aside>

    <!-- MAIN -->
    <div>
      <header class="top">
        <div class="search">
          🔍
          <input
            class="input"
            id="recordSearch"
            placeholder="Search records…"
            style="background:transparent;border:none;padding:0"
          />
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="chip">
            Logged in as
            <strong id="accountName" style="margin-left:.35rem">Client</strong>
          </div>
        </div>
      </header>

      <main>
        <div style="display:flex;justify-content:space-between;align-items:end;gap:.75rem;flex-wrap:wrap">
          <div>
            <h2 style="margin:0">Medical Records</h2>
            <small style="color:var(--muted)">
              View lab results, prescriptions, and visit summaries for your pets.
            </small>
          </div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
            <select class="input" id="filterPet" style="width:170px">
              <option value="">All pets</option>
            </select>
            <select class="input" id="filterType" style="width:170px">
              <option value="">All types</option>
            </select>
            <button class="btn" id="addRecordBtn">+ Add record</button>
          </div>
        </div>

        <div class="card" style="overflow:hidden;margin-top:.75rem">
          <div style="overflow:auto">
            <table id="recordsTable">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Pet</th>
                  <th>Type</th>
                  <th>Notes</th>
                  <th style="text-align:right">File</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem;border-top:1px solid var(--border)">
            <div id="recordsPageInfo" style="color:var(--muted)">0–0 of 0</div>
            <div style="display:flex;gap:.5rem">
              <button class="btn ghost" id="prevRecords">◀ Prev</button>
              <button class="btn ghost" id="nextRecords">Next ▶</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ADD RECORD MODAL -->
  <div id="recordModal" class="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center">
    <div class="card" style="width:min(440px,92vw);max-height:90vh;overflow:auto;padding:1.25rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
        <h3 style="margin:0">Add medical record</h3>
        <button class="btn ghost" id="recordModalClose" type="button">✕</button>
      </div>
      <form id="recordForm">
        <label style="display:block;margin:.5rem 0 .25rem;color:var(--muted)">Pet</label>
        <select class="input" id="recPet" required style="width:100%"></select>

        <label style="display:block;margin:.75rem 0 .25rem;color:var(--muted)">Type</label>
        <input class="input" id="recType" list="recTypeList" placeholder="e.g. Vaccination" style="width:100%"/>
        <datalist id="recTypeList">
          <option value="Vaccination"></option>
          <option value="Lab Result"></option>
          <option value="Prescription"></option>
          <option value="Visit Summary"></option>
          <option value="Surgery"></option>
          <option value="Deworming"></option>
        </datalist>

        <label style="display:block;margin:.75rem 0 .25rem;color:var(--muted)">Date</label>
        <input class="input" id="recDate" type="date" style="width:100%"/>

        <label style="display:block;margin:.75rem 0 .25rem;color:var(--muted)">Notes</label>
        <textarea class="input" id="recNotes" rows="3" placeholder="Optional notes…" style="width:100%"></textarea>

        <label style="display:block;margin:.75rem 0 .25rem;color:var(--muted)">File (image or PDF, optional)</label>
        <input class="input" id="recFile" type="file" accept="image/*,application/pdf" style="width:100%"/>

        <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem">
          <button class="btn secondary" type="button" id="recordCancel">Cancel</button>
          <button class="btn" type="submit" id="recordSubmit">Save record</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script src="/client/js/core.js"></script>
  <script src="/client/js/records.js"></script>
</body>
</html>
