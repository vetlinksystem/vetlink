<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client • Appointments</title>
  <link href="/client/css/core.css" rel="stylesheet"/>
  <link href="/client/css/appointments.css" rel="stylesheet"/>
</head>
<body data-page="#appointments">
  <div id="scrim"></div>

  <div class="shell">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="brand">
        <div class="logo">🐾</div>
        <div><strong>VetLink</strong><br/><small>Client Portal</small></div>
      </div>
      <nav class="nav">
        <a href="/client/dashboard"    data-page="#dashboard">Dashboard</a>
        <a href="/client/pets"         data-page="#pets">My Pets</a>
        <a href="/client/appointments" data-page="#appointments" class="active">Appointments</a>
        <a href="/client/records"      data-page="#records">Records</a>
        <a href="/client/profile"      data-page="#profile">Profile</a>

        <div style="padding:.75rem;margin-top:.75rem">
          <button class="btn secondary" id="logoutBtn">Log out</button>
        </div>
      </nav>
    </aside>

    <!-- MAIN -->
    <div>
      <header class="top">
        <h3 style="margin:0">Appointments</h3>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="chip">
            Logged in as
            <strong id="accountName" style="margin-left:.35rem">Client</strong>
          </div>
        </div>
      </header>

      <main>
        <div style="display:flex;justify-content:space-between;align-items:end;gap:.75rem;flex-wrap:wrap">
          <div>
            <h2 style="margin:0">Appointments</h2>
            <small style="color:var(--muted)">View your visit history and request new appointments.</small>
          </div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
            

            
            <div class="search" style="min-width:240px">
              🔍
              <input
                class="input"
                id="apptSearch"
                placeholder="Search appointments…"
                style="background:transparent;border:none;padding:0"
              />
            </div>
<select class="input" id="statusFilter" style="width:160px">
              <option value="all">All statuses</option>
              <option value="Pending">Pending</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
            </select>
            <button class="btn" id="addApptBtn">➕ Book Appointment</button>
          </div>
        </div>

        <div class="card" style="overflow:hidden;margin-top:.75rem">
          <div style="overflow:auto">
            <table id="apptTable">
              <thead>
                <tr>
                  <th>Date &amp; Time</th>
                  <th>Pet</th>
                  <th>Service</th>
                  <th>Status</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem;border-top:1px solid var(--border)">
            <div id="apptPageInfo" style="color:var(--muted)">0–0 of 0</div>
            <div style="display:flex;gap:.5rem">
              <button class="btn ghost" id="prevAppt">◀ Prev</button>
              <button class="btn ghost" id="nextAppt">Next ▶</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Book Appointment Modal -->
  <div class="modal" id="apptModal" role="dialog" aria-modal="true">
    <div class="panel">
      <header>
        <strong id="apptModalTitle">Book Appointment</strong>
        <button class="btn ghost" data-close>✖</button>
      </header>
      <div class="content">
        <div class="form-grid" style="display:grid;gap:1rem;grid-template-columns:repeat(2,1fr)">
          <label style="grid-column:span 2">
            <span>Pet</span>
            <select class="input" id="aPet"></select>
          </label>
          <label>
            <span>Date</span>
            <input class="input" id="aDate" type="date"/>
          </label>
          <label>
            <span>Time</span>
            <input class="input" id="aTime" type="time"/>
          </label>
          <label style="grid-column:span 2">
            <span>Service</span>
            <select class="input" id="aService">
              <option value="Check-up">Check-up</option>
              <option value="Vaccination">Vaccination</option>
              <option value="Grooming">Grooming</option>
              <option value="Deworming">Deworming</option>
              <option value="Consultation">Consultation</option>
              <option value="Other">Other</option>
            </select>
          </label>
          <label style="grid-column:span 2">
            <span>Notes (optional)</span>
            <textarea class="input" id="aNotes" rows="3" placeholder="Add any details the clinic should know…"></textarea>
          </label>

          <div class="col-2" style="grid-column:span 2;display:flex;gap:.5rem;justify-content:flex-end">
            <button class="btn ghost" data-close>Cancel</button>
            <button class="btn" id="aSubmit">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script src="/client/js/core.js"></script>
  <script src="/client/js/appointments.js"></script>
</body>
</html>
