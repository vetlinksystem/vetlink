<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetLink — Registered User</title>
  <link rel="stylesheet" href="employee/css/dashboard.css"/>
  <link rel="stylesheet" href="employee/css/registered_users.css"/>
</head>
<body>
<div id="app" class="layout">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="brand"><img src="/logo.png" class="logo" alt="VetLink"/><span class="brand-name">VetLink</span></div>
    <nav class="nav">
      <a class="nav-item active" href="/employee/dashboard"><span class="icon">📊</span><span>Analytic Dashboard</span></a>
      <a class="nav-item" href="/employee/users"><span class="icon">👥</span><span>Registered User</span></a>
      <a class="nav-item" href="/employee/employees"><span class="icon">🧑</span><span>Manage Employees</span></a>
      <a class="nav-item" href="/employee/pets"><span class="icon">🐾</span><span>Manage Pets</span></a>
      <a class="nav-item" href="/employee/schedule"><span class="icon">🗓️</span><span>Schedule</span></a>
      <a class="nav-item" href="/employee/appointments"><span class="icon">📝</span><span>Appointments</span></a>
      <a class="nav-item" href="/employee/profile"><span class="icon">⚙️</span><span>Update Profile</span></a>
      <div class="nav-spacer"></div>
      <button class="nav-item danger" id="logoutBtn"><span class="icon">↩️</span><span>Logout</span></button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button id="sidebarToggle" class="ghost-btn" aria-label="Toggle menu">☰</button>
      <div class="breadcrumbs">Home <span class="sep">/</span> <span id="crumb">Registered User</span></div>
      <div class="account">
        <button id="accountBtn" class="avatar-btn" aria-haspopup="menu" aria-expanded="false">
          <span id="accountName">User</span><span class="avatar" aria-hidden="true">🛡️</span>
        </button>
        <div id="accountMenu" class="menu" role="menu">
          <a href="/employee/profile" role="menuitem">Settings / Profile</a>
          <a href="#" id="menuLogout" role="menuitem">Logout</a>
        </div>
      </div>
    </header>

    <section class="view active">
      <h1 class="page-title">Registered User</h1>

      <div class="card" style="margin-bottom: .75rem">
        <div class="users-toolbar">
          <div class="searchbar" role="search">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input id="userSearch" class="input search-input" placeholder="Search by name, email, contact, address, or ID..."/>
          </div>
          <div class="search-tip">Tip: you can search by ID too.</div>
        </div>
      </div>

      <div class="card table">
        <table id="usersTable">
          <thead>
            <tr>
              <th></th>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Contact No.</th>
              <th>Address</th>
              <th class="cell-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Edit User Modal -->
    <div class="modal" id="userEditModal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-backdrop" data-close></div>
      <div class="panel panel-md">
        <header class="modal-header">
          <strong>Update Registered User</strong>
          <button class="ghost-btn" type="button" data-close aria-label="Close">✕</button>
        </header>
        <div class="content">
          <input type="hidden" id="editUserId"/>
          <div class="form-grid">
            <label class="field full">
              <span>Name</span>
              <input class="input" id="editUserName"/>
            </label>
            <label class="field full">
              <span>Email</span>
              <input class="input" id="editUserEmail" type="email"/>
            </label>
            <label class="field">
              <span>Contact No.</span>
              <input class="input" id="editUserNumber"/>
            </label>
            <label class="field">
              <span>Address</span>
              <input class="input" id="editUserAddress"/>
            </label>
            <label class="field full">
              <span>New Password (optional)</span>
              <input class="input" id="editUserPassword" type="password" placeholder="Leave blank to keep current"/>
              <small class="hint">Leave blank to keep current password.</small>
            </label>
            <div class="modal-actions">
              <button class="btn btn-secondary" type="button" data-close>Cancel</button>
              <button class="btn btn-primary" id="saveUserBtn" type="button">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="employee/js/core.js"></script>
<script src="employee/js/registered_users.js"></script>
</body>
</html>
