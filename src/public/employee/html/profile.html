<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetLink — Update Profile</title>
  <link rel="stylesheet" href="/employee/css/dashboard.css"/>
  <link rel="stylesheet" href="/employee/css/profile.css"/>
</head>
<body>
<div id="app" class="layout">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <img src="/logo.png" class="logo" alt="VetLink"/>
      <span class="brand-name">VetLink</span>
    </div>
    <nav class="nav">
      <a class="nav-item" href="/employee/dashboard"><span class="icon">📊</span><span>Analytic Dashboard</span></a>
      <a class="nav-item" href="/employee/users"><span class="icon">👥</span><span>Registered User</span></a>
      <a class="nav-item" href="/employee/employees"><span class="icon">🧑</span><span>Manage Employees</span></a>
      <a class="nav-item" href="/employee/pets"><span class="icon">🐾</span><span>Manage Pets</span></a>
      <a class="nav-item" href="/employee/schedule"><span class="icon">🗓️</span><span>Schedule</span></a>
      <a class="nav-item" href="/employee/appointments"><span class="icon">📝</span><span>Appointments</span></a>
      <a class="nav-item active" href="/employee/profile"><span class="icon">⚙️</span><span>Update Profile</span></a>
      <div class="nav-spacer"></div>
      <button class="nav-item danger" id="logoutBtn"><span class="icon">↩️</span><span>Logout</span></button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button id="sidebarToggle" class="ghost-btn" aria-label="Toggle menu">☰</button>
      <div class="breadcrumbs">Home <span class="sep">/</span> <span id="crumb">Update Profile</span></div>
      <div class="account">
        <button id="accountBtn" class="avatar-btn" aria-haspopup="menu" aria-expanded="false">
          <span id="accountName">User</span><span class="avatar" aria-hidden="true">🛡️</span>
        </button>
        <div id="accountMenu" class="menu" role="menu">
          <a href="/employee/profile" role="menuitem">Settings / Profile</a>
          <a href="#" id="menuLogout" role="menuitem">Logout</a>
        </div>
      </div>
    </header>

    <section class="view active">
      <h1 class="page-title">Update Profile</h1>

      <!-- Status box used by profile.js -->
      <div id="profileStatus" class="status hidden"></div>

      <!-- One big form for info + security (profile.js uses #profileForm) -->
      <form id="profileForm">
        <div class="grid">
          <!-- Avatar -->
          <!-- Personal Info -->
          <div class="card">
            <h2 class="panel-title">Personal Information</h2>
            <div class="form-grid">
              <label>
                <span>Full Name</span>
                <!-- name="name" used by profile.js -->
                <input id="nameInput" name="name" type="text" required placeholder="Your full name"/>
              </label>
              <label>
                <span>Email</span>
                <!-- name="email" used by profile.js -->
                <input id="emailInput" name="email" type="email" required placeholder="you@vetlink.cloud" readonly/>
              </label>
              <label>
                <span>Contact No.</span>
                <!-- name="number" used by profile.js -->
                <input id="phoneInput" name="number" type="tel" required placeholder="09xx-xxx-xxxx"/>
              </label>

              <!-- Position/Role is admin-managed; read-only here -->
              <div class="readonly wide">
                <span>Position</span>
                <div id="roleValue" class="ro">—</div>
              </div>
            </div>
          </div>

          <!-- Security (password) -->
          <div class="card">
            <h2 class="panel-title">Security</h2>
            <div class="form-grid">
              <label class="wide">
                <span>Current Password</span>
                <input id="curPassInput" name="current_password" type="password" autocomplete="current-password" placeholder="Enter current password"/>
              </label>
              <label class="wide">
                <span>New Password</span>
                <!-- name="password" used by profile.js; sent only if not empty -->
                <input id="newPassInput" name="password" type="password" minlength="8" autocomplete="new-password" placeholder="Leave blank to keep current password"/>
                <div class="hint">Use 8+ characters.</div>
              </label>
              <label class="wide">
                <span>Confirm New Password</span>
                <input id="confirmPassInput" name="confirm_password" type="password" minlength="8" autocomplete="new-password" placeholder="Re-enter new password"/>
              </label>
            </div>
          </div>
        </div>

        <!-- Save button (profile.js uses #profileSaveBtn) -->
        <div class="form-actions">
          <button type="submit" id="profileSaveBtn" class="btn-primary">Save Changes</button>
        </div>
      </form>

    </section>
  </div>
</div>

<script src="/employee/js/core.js"></script>
<script src="/employee/js/profile.js"></script>
</body>
</html>
