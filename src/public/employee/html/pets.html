<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetLink — Manage Pets</title>
  <link rel="stylesheet" href="/employee/css/dashboard.css"/>
  <link rel="stylesheet" href="/employee/css/pets.css"/>
</head>
<body>
<div id="app" class="layout">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <img src="/logo.png" class="logo" alt="VetLink"/>
      <span class="brand-name">VetLink</span>
    </div>
    <nav class="nav">
      <a class="nav-item" href="/employee/dashboard"><span class="icon">📊</span><span>Analytic Dashboard</span></a>
      <a class="nav-item" href="/employee/users"><span class="icon">👥</span><span>Registered User</span></a>
      <a class="nav-item" href="/employee/employees"><span class="icon">🧑</span><span>Manage Employees</span></a>
      <a class="nav-item active" href="/employee/pets"><span class="icon">🐾</span><span>Manage Pets</span></a>
      <a class="nav-item" href="/employee/breeding"><span class="icon">💞</span><span>Breeding</span></a>
      <a class="nav-item" href="/employee/schedule"><span class="icon">🗓️</span><span>Schedule</span></a>
      <a class="nav-item" href="/employee/appointments"><span class="icon">📝</span><span>Appointments</span></a>
      <a class="nav-item" href="/employee/profile"><span class="icon">⚙️</span><span>Update Profile</span></a>
      <div class="nav-spacer"></div>
      <button class="nav-item danger" id="logoutBtn"><span class="icon">↩️</span><span>Logout</span></button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button id="sidebarToggle" class="ghost-btn" aria-label="Toggle menu">☰</button>
      <div class="breadcrumbs">Home <span class="sep">/</span> <span>Manage Pets</span></div>
      <div class="account">
        <button id="accountBtn" class="avatar-btn" aria-haspopup="menu" aria-expanded="false">
          <span id="accountName">User</span><span class="avatar" aria-hidden="true">🛡️</span>
        </button>
        <div id="accountMenu" class="menu" role="menu">
          <a href="/employee/profile" role="menuitem">Settings / Profile</a>
          <a href="#" id="menuLogout" role="menuitem">Logout</a>
        </div>
      </div>
    </header>

    <section class="view active pets">
      <h1 class="page-title">Manage Pets</h1>

      <!-- FILTERS + PETS TABLE -->
      <div class="page-head">
        <div class="tools">
          <input id="searchBox" class="search" type="search" placeholder="Search pet, breed, owner…"/>
          <select id="filterSpecies" class="select"><option value="">All species</option></select>
          <select id="filterBreed" class="select"><option value="">All breeds</option></select>
          <select id="filterSex" class="select">
            <option value="">Any sex</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
          <label class="chk">
            <input id="onlyBreeding" type="checkbox"/> <span>Available for breeding</span>
          </label>
        </div>
      </div>

      <div class="card table">
        <div class="table-head">
          <div><strong>Pets</strong></div>
          <div id="petsMeta" class="muted"></div>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:70px;">ID</th>
              <th>Name</th>
              <th>Breed</th>
              <th>Species</th>
              <th>Sex</th>
              <th>Age</th>
              <th>Owner</th>
              <th>Breeding</th>
              <th style="width:160px;">Actions</th>
            </tr>
          </thead>
          <tbody id="petsTbody"></tbody>
        </table>

        <!-- Pager -->
        <div class="table-foot">
          <div id="petsCount" class="muted"></div>
          <div class="pager">
            <button class="btn btn-tool" id="pgFirst" title="First">«</button>
            <button class="btn btn-tool" id="pgPrev"  title="Prev">‹</button>
            <span id="pgPages" class="pages"></span>
            <button class="btn btn-tool" id="pgNext"  title="Next">›</button>
            <button class="btn btn-tool" id="pgLast"  title="Last">»</button>
            <select id="pageSize" class="select">
              <option value="10">10 / page</option>
              <option value="25">25 / page</option>
              <option value="50">50 / page</option>
            </select>
          </div>
        </div>
      </div>

    </section>
  </div>
</div>

<script src="/employee/js/core.js"></script>
<script src="/employee/js/pets.js"></script>
</body>
</html>
