<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetLink — Manage Employees</title>
  <link rel="stylesheet" href="/employee/css/dashboard.css"/><!-- your global employee css -->
  <link rel="stylesheet" href="/employee/css/manage_employees.css"/>
</head>
<body>
<div id="app" class="layout">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <img src="/logo.png" class="logo" alt="VetLink"/>
      <span class="brand-name">VetLink</span>
    </div>
    <nav class="nav">
      <a class="nav-item" href="/employee/dashboard"><span class="icon">📊</span><span>Analytic Dashboard</span></a>
      <a class="nav-item" href="/employee/users"><span class="icon">👥</span><span>Registered User</span></a>
      <a class="nav-item active" href="/employee/employees"><span class="icon">🧑</span><span>Manage Employees</span></a>
      <a class="nav-item" href="/employee/pets"><span class="icon">🐾</span><span>Manage Pets</span></a>
      <a class="nav-item" href="/employee/schedule"><span class="icon">🗓️</span><span>Schedule</span></a>
      <a class="nav-item" href="/employee/reservation"><span class="icon">📝</span><span>Reservation</span></a>
      <a class="nav-item" href="/employee/profile"><span class="icon">⚙️</span><span>Update Profile</span></a>
      <div class="nav-spacer"></div>
      <button class="nav-item danger" id="logoutBtn"><span class="icon">↩️</span><span>Logout</span></button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button id="sidebarToggle" class="ghost-btn" aria-label="Toggle menu">☰</button>
      <div class="breadcrumbs">Home <span class="sep">/</span> <span id="crumb">Manage Employees</span></div>
      <div class="account">
        <button id="accountBtn" class="avatar-btn" aria-haspopup="menu" aria-expanded="false">
          <span id="accountName">User</span><span class="avatar" aria-hidden="true">🛡️</span>
        </button>
        <div id="accountMenu" class="menu" role="menu">
          <a href="/employee/profile" role="menuitem">Settings / Profile</a>
          <a href="#" id="menuLogout" role="menuitem">Logout</a>
        </div>
      </div>
    </header>

    <section class="view active">
      <div class="page-head">
        <h1 class="page-title">Manage Employees</h1>
        <button id="addEmployeeBtn" class="btn-primary">＋ Add Employee</button>
      </div>

      <div class="card table">
        <table id="empTable">
          <thead>
            <tr>
              <th style="width:70px;">ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Contact No.</th>
              <th>Role</th>
              <th>Status</th>
              <th style="width:120px;">Actions</th>
            </tr>
          </thead>
          <tbody id="empTbody"></tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<!-- Modal -->
<div id="empModal" class="modal" aria-hidden="true" aria-labelledby="empModalTitle" role="dialog">
  <div class="modal-backdrop" data-close-modal></div>
  <div class="modal-card" role="document">
    <div class="modal-head">
      <h2 id="empModalTitle">Add Employee</h2>
      <button class="modal-close" title="Close" data-close-modal>✕</button>
    </div>
    <form id="empForm" class="modal-body">
      <input type="hidden" id="empId"/>
      <div class="form-grid">
        <label>
          <span>Name</span>
          <input id="empName" type="text" required placeholder="Full name"/>
        </label>
        <label>
          <span>Email</span>
          <input id="empEmail" type="email" required placeholder="name@company.com"/>
        </label>
        <label>
          <span>Contact No.</span>
          <input id="empPhone" type="tel" required placeholder="09xx-xxx-xxxx"/>
        </label>
        <label>
          <span>Password</span>
          <input id="empPassword" type="password" minlength="6" placeholder="••••••"/>
        </label>
        <label>
          <span>Role</span>
          <select id="empRole">
            <option value="Staff">Staff</option>
            <option value="Veterinarian">Veterinarian</option>
            <option value="Admin">Admin</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="empIsAdmin" type="checkbox"/> <span>Is Admin?</span>
        </label>
        <label>
          <span>Status</span>
          <select id="empStatus">
            <option value="Active">Active</option>
            <option value="On Leave">On Leave</option>
            <option value="Inactive">Inactive</option>
          </select>
        </label>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-ghost" data-close-modal>Cancel</button>
        <button type="submit" class="btn-primary" id="empSaveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/employee/js/core.js"></script>
<script src="/employee/js/manage_employees.js"></script>
</body>
</html>
